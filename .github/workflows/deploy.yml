name: Deploy Next.js static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_BASE_PATH: /Agenda

    steps:
      - name: Manual checkout with retry
        run: |
          for i in 1 2 3 4 5; do
            echo "Tentativa $i de clonar o repositório..."
            git clone --depth 1 --branch main https://github.com/ConexaoStreet/Agenda.git .
            if [ $? -eq 0 ]; then
              echo "Repositório clonado com sucesso."
              exit 0
            fi
            echo "Falhou. Tentando novamente em 10 segundos..."
            sleep 10
          done
          echo "Não foi possível clonar o repositório."
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
